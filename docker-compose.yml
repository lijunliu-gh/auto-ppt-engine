services:
  auto-ppt:
    build: .
    ports:
      - "5000:5000"
    environment:
      # --- Choose ONE LLM provider ---
      # OpenAI / reasoning models (default)
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      #- OPENAI_BASE_URL=              # For Qwen, DeepSeek, GLM, MiniMax, etc.

      # Anthropic Claude
      #- ANTHROPIC_API_KEY=

      # Google Gemini
      #- GOOGLE_API_KEY=

      # OpenRouter (200+ models via one key)
      #- OPENROUTER_API_KEY=

      # Optional: Tavily web research
      #- TAVILY_API_KEY=
    volumes:
      - ./output:/app/output
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
